<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>芝士大王专用拼图</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --primary: #4A6CF7;
            --primary-light: #eef1fe;
            --danger: #ef4444;
            --success: #10b981;
            --text: #1e293b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px rgba(0,0,0,0.07);
            --radius: 12px;
            --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;user-select:none;background-image:radial-gradient(ellipse at 20% 20%, rgba(74,108,247,0.04) 0%, transparent 50%)}
        .app-header{background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100}
        .header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
        .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
        .logo span{background:var(--primary);color:#fff;width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center}
        .main-container{max-width:1200px;margin:0 auto;padding:20px 16px 60px}
        .card{background:#fff;border-radius:var(--radius);padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
        .upload-zone{border:2px dashed #cbd5e1;border-radius:12px;padding:30px;text-align:center;cursor:pointer;background:#fafbfc;margin-bottom:12px}
        .upload-zone.drag-over{border-color:var(--primary);background:#f5f6ff}
        .selector-group{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center}
        .selector-group .label{font-weight:600;font-size:14px;margin-right:4px}
        .btn-option{padding:6px 16px;border-radius:20px;border:2px solid var(--border);background:#fff;font-weight:600;cursor:pointer;font-size:13px;transition:0.2s}
        .btn-option.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
        .photos-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(70px,1fr));gap:8px;max-height:250px;overflow-y:auto;padding:4px}
        .thumb-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:grab;border:2px solid transparent}
        .thumb-item img{width:100%;height:100%;object-fit:cover;pointer-events:none}
        .thumb-item .badge{position:absolute;top:2px;left:2px;background:rgba(0,0,0,0.6);color:#fff;width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center}
        .thumb-item .del-btn{position:absolute;top:2px;right:2px;background:rgba(239,68,68,0.9);color:#fff;border:none;width:18px;height:18px;border-radius:50%;font-size:12px;display:none;cursor:pointer}
        .thumb-item:hover .del-btn{display:flex;align-items:center;justify-content:center}
        .btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border-radius:20px;border:none;font-weight:600;font-size:13px;cursor:pointer;background:#fff;color:var(--text);transition:0.2s}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:disabled{opacity:0.5;pointer-events:none}
        .btn-danger{color:var(--danger);border:1.5px solid #fecaca}
        .btn-success{background:var(--success);color:#fff}
        .results-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(220px,1fr));gap:16px}
        .result-card{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
        .result-card .card-header{padding:10px 14px;background:#fafbfc;font-weight:600;font-size:13px;display:flex;justify-content:space-between}
        .result-card img{width:100%;aspect-ratio:auto;max-height:300px;object-fit:contain;background:#f8fafc;cursor:pointer}
        .result-card .actions{padding:10px;display:flex;flex-wrap:wrap;gap:6px}
        .actions .btn{flex:1;justify-content:center;padding:6px 10px;font-size:12px}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;display:flex;align-items:center;justify-content:center}
        .modal-panel{background:#fff;border-radius:var(--radius);padding:24px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
        .modal-panel h3{margin-bottom:16px}
        .modal-panel input,.modal-panel select{width:100%;padding:8px;margin-bottom:12px;border-radius:8px;border:1px solid var(--border);font-size:14px}
        .modal-panel label{font-weight:600;font-size:14px;display:block;margin-bottom:4px}
        .modal-panel .btn-row{display:flex;gap:8px;margin-top:16px}
        .watermark-edit-container{position:relative;width:100%;margin:10px 0;border:1px solid var(--border);border-radius:8px;overflow:hidden;touch-action:none;background:#f8fafc}
        .watermark-edit-container canvas{width:100%;display:block}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:600;animation:toastIn 0.3s}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
    </style>
</head>
<body>
<header class="app-header">
    <div class="header-inner">
        <div class="logo"><span>🧀</span> 芝士大王专用拼图</div>
        <div style="font-size:12px;color:#64748b;">无限上传 · 原图比例 · 水印缩放</div>
    </div>
</header>

<div class="main-container">
    <div class="card">
        <h3 style="margin-bottom:10px;">📤 上传照片 (不限量)</h3>
        <div class="upload-zone" id="uploadZone">
            <div style="font-size:32px;">🖼️</div>
            <div style="font-weight:600;">点击或拖拽照片到此处</div>
            <div style="font-size:13px;color:#94a3b8;">JPG/PNG/WebP · 不限数量</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple hidden>

        <div class="selector-group">
            <span class="label">📐 宫格：</span>
            <button class="btn-option active" data-grid="2x2">四宫格</button>
            <button class="btn-option" data-grid="3x3">九宫格</button>
            <button class="btn-option" data-grid="4x4">十六宫格</button>
            <button class="btn-option" data-grid="1x1">单张</button>
        </div>
        <div class="selector-group">
            <span class="label">📏 比例：</span>
            <button class="btn-option active" data-ratio="1:1">1:1</button>
            <button class="btn-option" data-ratio="3:4">3:4</button>
            <button class="btn-option" data-ratio="9:16">9:16</button>
            <button class="btn-option" data-ratio="original">原图</button>
        </div>
        <div class="selector-group">
            <span class="label">🔢 标号：</span>
            <button class="btn-option active" data-numbering="true">开启</button>
            <button class="btn-option" data-numbering="false">关闭</button>
        </div>

        <div id="photosSection" style="display:none; margin-top:12px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span><strong id="photoCount">0</strong> 张</span>
                <div style="display:flex; gap:6px;">
                    <button class="btn btn-danger" id="clearAllBtn">清空</button>
                    <button class="btn btn-primary" id="generateBtn">✨ 生成拼图</button>
                </div>
            </div>
            <div class="photos-grid" id="photosGrid"></div>
        </div>
    </div>

    <div id="resultsSection" style="display:none;">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
                <h3>🎉 拼图结果</h3>
                <div style="display:flex; gap:6px;">
                    <button class="btn btn-success" id="saveAllBtn">📱 一键保存全部</button>
                    <button class="btn btn-primary" id="downloadZipBtn">📦 打包下载 ZIP</button>
                </div>
            </div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </div>
</div>

<div id="loadingOverlay" style="position:fixed; inset:0; background:rgba(255,255,255,0.8); backdrop-filter:blur(4px); z-index:400; display:none; align-items:center; justify-content:center; gap:12px;">
    <div style="width:40px; height:40px; border:4px solid #e2e8f0; border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite;"></div>
    <div id="loadingText">处理中...</div>
</div>

<script>
(function() {
    // ==================== DOM ====================
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const photosSection = document.getElementById('photosSection');
    const photosGrid = document.getElementById('photosGrid');
    const photoCountEl = document.getElementById('photoCount');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const generateBtn = document.getElementById('generateBtn');
    const resultsSection = document.getElementById('resultsSection');
    const resultsGrid = document.getElementById('resultsGrid');
    const downloadZipBtn = document.getElementById('downloadZipBtn');
    const saveAllBtn = document.getElementById('saveAllBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');

    let uploadedFiles = [];
    let objectURLs = [];
    let puzzleResults = [];
    let currentGrid = '2x2';
    let currentRatio = '1:1';
    let numberingEnabled = true;

    const GRID_CONFIG = {
        '2x2': { cols:2, rows:2 },
        '3x3': { cols:3, rows:3 },
        '4x4': { cols:4, rows:4 },
        '1x1': { cols:1, rows:1 }
    };

    function getFormat(ratio, grid, images) {
        const { cols, rows } = GRID_CONFIG[grid];
        if (ratio === 'original' && images && images.length) {
            const firstImg = images.find(img => img);
            if (firstImg) {
                const aspect = firstImg.width / firstImg.height;
                const CELL_BASE = 500;
                let cellW, cellH;
                if (aspect >= 1) { cellW = CELL_BASE; cellH = Math.round(CELL_BASE / aspect); }
                else { cellH = CELL_BASE; cellW = Math.round(CELL_BASE * aspect); }
                return { cellW, cellH, puzzleW: cellW * cols, puzzleH: cellH * rows, cols, rows };
            }
        }
        const BASE_CELL = 500;
        let cellW, cellH;
        if (ratio === '1:1') { cellW = BASE_CELL; cellH = BASE_CELL; }
        else if (ratio === '3:4') { cellW = BASE_CELL; cellH = Math.round(BASE_CELL * 4/3); }
        else if (ratio === '9:16') { cellW = BASE_CELL; cellH = Math.round(BASE_CELL * 16/9); }
        return { cellW: Math.round(cellW), cellH: Math.round(cellH), puzzleW: Math.round(cellW * cols), puzzleH: Math.round(cellH * rows), cols, rows };
    }

    function showToast(msg) {
        const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
        document.body.appendChild(t); setTimeout(()=>t.remove(), 2000);
    }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ==================== UI绑定 ====================
    document.querySelectorAll('.btn-option[data-grid]').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.btn-option[data-grid]').forEach(x => x.classList.remove('active'));
            b.classList.add('active'); currentGrid = b.dataset.grid;
        });
    });
    document.querySelectorAll('.btn-option[data-ratio]').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.btn-option[data-ratio]').forEach(x => x.classList.remove('active'));
            b.classList.add('active'); currentRatio = b.dataset.ratio;
        });
    });
    document.querySelectorAll('.btn-option[data-numbering]').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.btn-option[data-numbering]').forEach(x => x.classList.remove('active'));
            b.classList.add('active'); numberingEnabled = b.dataset.numbering === 'true';
        });
    });

    // ==================== 上传逻辑（无限量） ====================
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
        if (e.target.files.length) addFiles(Array.from(e.target.files));
        fileInput.value = '';
    });
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
        e.preventDefault(); uploadZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) addFiles(Array.from(e.dataTransfer.files));
    });

    function addFiles(newFiles) {
        const images = newFiles.filter(f => f.type.startsWith('image/'));
        if (!images.length) { showToast('请选择图片文件'); return; }
        uploadedFiles.push(...images);
        images.forEach(f => objectURLs.push(URL.createObjectURL(f)));
        resetResults(); renderPhotos();
        photosSection.style.display = 'block';
        photosSection.scrollIntoView({ behavior:'smooth' });
    }

    function renderPhotos() {
        photosGrid.innerHTML = '';
        uploadedFiles.forEach((file, i) => {
            const item = document.createElement('div');
            item.className = 'thumb-item'; item.draggable = true; item.dataset.index = i;
            item.innerHTML = `<img src="${objectURLs[i]}" draggable="false"><span class="badge">${i+1}</span><button class="del-btn">×</button>`;
            item.querySelector('.del-btn').addEventListener('click', e => { e.stopPropagation(); deletePhoto(i); });
            item.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', i); item.classList.add('dragging'); });
            item.addEventListener('dragend', () => item.classList.remove('dragging'));
            item.addEventListener('dragover', e => e.preventDefault());
            item.addEventListener('drop', e => { e.preventDefault(); const from = parseInt(e.dataTransfer.getData('text/plain')); if (from !== i) swapPhotos(from, i); });
            item.addEventListener('click', e => {
                if (e.target.classList.contains('del-btn')) return;
                const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
                inp.onchange = () => { if (inp.files[0]) replacePhoto(i, inp.files[0]); };
                inp.click();
            });
            photosGrid.appendChild(item);
        });
        photoCountEl.textContent = uploadedFiles.length;
        generateBtn.disabled = uploadedFiles.length === 0;
    }

    function deletePhoto(i) { URL.revokeObjectURL(objectURLs[i]); uploadedFiles.splice(i,1); objectURLs.splice(i,1); resetResults(); renderPhotos(); if (!uploadedFiles.length) photosSection.style.display='none'; }
    function replacePhoto(i, file) { if (!file.type.startsWith('image/')) return; URL.revokeObjectURL(objectURLs[i]); uploadedFiles[i]=file; objectURLs[i]=URL.createObjectURL(file); resetResults(); renderPhotos(); }
    function swapPhotos(a,b) { [uploadedFiles[a],uploadedFiles[b]]=[uploadedFiles[b],uploadedFiles[a]]; [objectURLs[a],objectURLs[b]]=[objectURLs[b],objectURLs[a]]; resetResults(); renderPhotos(); showToast('已交换位置'); }
    clearAllBtn.addEventListener('click', () => { objectURLs.forEach(u=>URL.revokeObjectURL(u)); uploadedFiles=[]; objectURLs=[]; resetResults(); renderPhotos(); photosSection.style.display='none'; });
    function resetResults() { puzzleResults=[]; resultsSection.style.display='none'; resultsGrid.innerHTML=''; }

    // ==================== 图片加载 ====================
    function loadImagesFromFiles(files) {
        return new Promise(resolve => {
            const imgs=[]; let loaded=0;
            if (!files.length) return resolve([]);
            files.forEach((file,i)=>{
                const reader=new FileReader();
                reader.onload=e=>{ const img=new Image(); img.onload=()=>{ imgs[i]=img; loaded++; check(); }; img.onerror=()=>{ imgs[i]=null; loaded++; check(); }; img.src=e.target.result; };
                reader.readAsDataURL(file);
            });
            function check(){ if(loaded===files.length) resolve(imgs.map((_,i)=>imgs[i])); }
        });
    }

    // ==================== 核心渲染 ====================
    function renderFinalPuzzle(images, offsets, fmt, grid, numbering, startNum, wm, sl, ratio) {
        const canvas = document.createElement('canvas');
        canvas.width = fmt.puzzleW; canvas.height = fmt.puzzleH;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,fmt.puzzleW,fmt.puzzleH);
        const totalCells = fmt.cols * fmt.rows;
        const isOriginal = ratio === 'original';

        for (let i=0; i<totalCells; i++) {
            const col = i % fmt.cols, row = Math.floor(i/fmt.cols);
            const posX = col * fmt.cellW, posY = row * fmt.cellH;
            const img = i < images.length ? images[i] : null;
            const off = offsets[i] || {x:0,y:0};
            ctx.save(); ctx.beginPath(); ctx.rect(posX,posY,fmt.cellW,fmt.cellH); ctx.clip();
            if (img && img.width && img.height) {
                if (isOriginal) {
                    const scale = Math.min(fmt.cellW / img.width, fmt.cellH / img.height);
                    const sw = img.width * scale, sh = img.height * scale;
                    ctx.drawImage(img, posX+(fmt.cellW-sw)/2+off.x, posY+(fmt.cellH-sh)/2+off.y, sw, sh);
                } else {
                    const scale = Math.max(fmt.cellW / img.width, fmt.cellH / img.height);
                    const sw = img.width * scale, sh = img.height * scale;
                    ctx.drawImage(img, posX+(fmt.cellW-sw)/2+off.x, posY+(fmt.cellH-sh)/2+off.y, sw, sh);
                }
            } else {
                ctx.fillStyle='#f1f5f9'; ctx.fillRect(posX,posY,fmt.cellW,fmt.cellH);
                ctx.fillStyle='#94a3b8'; ctx.font='bold 20px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText('空', posX+fmt.cellW/2, posY+fmt.cellH/2);
            }
            if (numbering && startNum!==undefined) {
                const num = startNum + i;
                ctx.restore(); ctx.save();
                const numFontSize = Math.min(fmt.cellW, fmt.cellH) * 0.12;
                ctx.font = `bold ${numFontSize}px "Arial"`; ctx.textAlign='center'; ctx.textBaseline='bottom';
                ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillText(num, posX+fmt.cellW/2+1, posY+fmt.cellH-10+1);
                ctx.fillStyle='#ffffff'; ctx.fillText(num, posX+fmt.cellW/2, posY+fmt.cellH-10);
                ctx.restore(); ctx.save();
            }
            ctx.restore();
        }
        if (sl && sl.enabled && sl.intensity>0) {
            ctx.save(); ctx.globalAlpha = sl.intensity/100;
            const grad = ctx.createRadialGradient(fmt.puzzleW/2, fmt.puzzleH/2, 0, fmt.puzzleW/2, fmt.puzzleH/2, Math.max(fmt.puzzleW, fmt.puzzleH));
            grad.addColorStop(0,'rgba(255,255,255,0.8)'); grad.addColorStop(0.6,'rgba(255,255,255,0.3)'); grad.addColorStop(1,'rgba(255,255,255,0)');
            ctx.fillStyle=grad; ctx.fillRect(0,0,fmt.puzzleW,fmt.puzzleH);
            ctx.restore();
        }
        if (wm && wm.enabled && wm.img) {
            ctx.save(); ctx.globalAlpha = wm.opacity;
            const wmW = wm.width || (wm.img.width * (wm.sizePercent/100));
            const wmH = wm.height || (wm.img.height * (wm.sizePercent/100));
            const x = fmt.puzzleW * wm.anchorX - wmW/2;
            const y = fmt.puzzleH * wm.anchorY - wmH/2;
            ctx.drawImage(wm.img, x, y, wmW, wmH);
            ctx.restore();
        }
        ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=2; ctx.strokeRect(1,1,fmt.puzzleW-2,fmt.puzzleH-2);
        return canvas.toDataURL('image/jpeg',0.92);
    }

    // ==================== 生成拼图 ====================
    generateBtn.addEventListener('click', async () => {
        if (!uploadedFiles.length) return;
        const grid = currentGrid; const ratio = currentRatio;
        loadingOverlay.style.display='flex'; loadingText.textContent='加载照片...'; generateBtn.disabled=true;
        try {
            const images = await loadImagesFromFiles(uploadedFiles);
            const fmt = getFormat(ratio, grid, images);
            const groupSize = GRID_CONFIG[grid].cols * GRID_CONFIG[grid].rows;
            loadingText.textContent='生成中...';
            puzzleResults=[];
            const groupCount = Math.ceil(images.length / groupSize);
            let globalNum = 1;
            for (let g=0; g<groupCount; g++) {
                const group = images.slice(g*groupSize, g*groupSize+groupSize);
                const sources = group.map(img=>img?img.src:null);
                const offsets = Array(groupSize).fill(null).map(()=>({x:0,y:0}));
                const startNum = numberingEnabled ? globalNum : undefined;
                const rawURL = renderFinalPuzzle(group, offsets, fmt, grid, numberingEnabled, startNum, null, null, ratio);
                puzzleResults.push({
                    rawDataURL: rawURL, dataURL: rawURL, offsets, imageSources: sources,
                    format: {...fmt, grid, ratio}, numbering: numberingEnabled, startNum: startNum,
                    watermark: { enabled:false, img:null, sizePercent:20, anchorX:0.5, anchorY:0.5, opacity:0.7 },
                    softlight: { intensity:0, enabled:false }
                });
                globalNum += group.length;
                await sleep(10);
            }
            renderResults();
            resultsSection.style.display='block';
            resultsSection.scrollIntoView({ behavior:'smooth' });
        } catch(err) { console.error(err); showToast('生成失败'); }
        finally { loadingOverlay.style.display='none'; generateBtn.disabled=false; }
    });

    function renderResults() {
        resultsGrid.innerHTML='';
        puzzleResults.forEach((puzzle, idx) => {
            const card = document.createElement('div');
            card.className='result-card';
            card.innerHTML=`
                <div class="card-header"><span>拼图 #${idx+1}</span><span>${puzzle.imageSources.filter(Boolean).length}/${puzzle.offsets.length} 张</span></div>
                <img src="${puzzle.dataURL}" alt="拼图${idx+1}">
                <div class="actions">
                    <button class="btn edit-pos">🖐️ 位置</button>
                    <button class="btn watermark-btn">🏞️ 水印/柔光</button>
                    <button class="btn reset-fx" style="color:#ef4444;">↺ 重置</button>
                    <button class="btn download-btn">💾 下载</button>
                    <button class="btn save-btn">📱 相册</button>
                </div>`;
            card.querySelector('.edit-pos').addEventListener('click', ()=>openEditor(idx));
            card.querySelector('.watermark-btn').addEventListener('click', ()=>openWatermarkSettings(idx));
            card.querySelector('.reset-fx').addEventListener('click', ()=>resetEffects(idx));
            card.querySelector('.download-btn').addEventListener('click', ()=>downloadSingle(puzzle, idx));
            card.querySelector('.save-btn').addEventListener('click', ()=>saveToAlbum(puzzle.dataURL, idx));
            card.querySelector('img').addEventListener('click', ()=>openPreview(puzzle.dataURL));
            resultsGrid.appendChild(card);
        });
    }

    // ==================== 一键保存全部（iOS引导方案） ====================
    saveAllBtn.addEventListener('click', () => {
        if (!puzzleResults.length) {
            showToast('请先生成拼图');
            return;
        }

        // 检测是否为iOS设备
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

        // 构建一个新页面展示所有拼图
        const allImagesHTML = puzzleResults.map((p, i) => {
            return `<div style="margin-bottom:24px; text-align:center;">
                <p style="font-weight:bold; margin-bottom:8px;">拼图 #${i+1}</p>
                <img src="${p.dataURL}" style="width:100%;max-width:400px;border-radius:12px;display:block;margin:0 auto;">
            </div>`;
        }).join('');

        const newWindow = window.open('', '_blank');
        newWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>保存全部拼图到相册</title>
                <style>
                    body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 16px; margin: 0; }
                    .tip-banner { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
                    .tip-banner h2 { margin: 0 0 8px 0; font-size: 18px; }
                    .tip-banner p { margin: 0; font-size: 14px; color: #64748b; line-height: 1.6; }
                    .tip-banner .emoji { font-size: 32px; }
                </style>
            </head>
            <body>
                <div class="tip-banner">
                    <div class="emoji">📱</div>
                    <h2>保存全部拼图到相册</h2>
                    <p>请<b>长按</b>每张图片，然后选择<b>「存储到“照片”」</b><br>即可逐一保存到你的相册中</p>
                    ${isIOS ? '<p style="color:#4A6CF7;margin-top:8px;">💡 iOS提示：在每张图片上长按，弹出菜单选择存储即可</p>' : '<p style="color:#4A6CF7;margin-top:8px;">💡 长按图片保存到相册，或使用下方下载按钮</p>'}
                </div>
                ${allImagesHTML}
            </body>
            </html>
        `);
        newWindow.document.close();
    });

    function reapplyEffects(idx) {
        const puzzle = puzzleResults[idx]; const fmt = puzzle.format;
        const loadPromises = puzzle.imageSources.map(src => new Promise(resolve => {
            if (!src) return resolve(null);
            const img = new Image(); img.onload=()=>resolve(img); img.onerror=()=>resolve(null); img.src=src;
        }));
        Promise.all(loadPromises).then(images => {
            puzzle.dataURL = renderFinalPuzzle(images, puzzle.offsets, fmt, fmt.grid, puzzle.numbering, puzzle.startNum,
                puzzle.watermark.enabled ? puzzle.watermark : null,
                puzzle.softlight.enabled ? puzzle.softlight : null, puzzle.format.ratio);
            renderResults(); showToast('效果已应用');
        });
    }
    function resetEffects(idx) {
        const puzzle = puzzleResults[idx];
        puzzle.watermark.enabled=false; puzzle.watermark.img=null;
        puzzle.softlight.enabled=false; puzzle.dataURL = puzzle.rawDataURL;
        renderResults(); showToast('效果已重置');
    }

    // ==================== 水印编辑（手指拖拽+无限缩放） ====================
    function openWatermarkSettings(idx) {
        const puzzle = puzzleResults[idx];
        const fmt = puzzle.format;
        const previewImg = new Image();
        previewImg.src = puzzle.dataURL;

        const modal = document.createElement('div');
        modal.className='modal-overlay';
        modal.innerHTML=`
            <div class="modal-panel">
                <h3>🏞️ 水印与柔光</h3>
                <label>上传水印图片 (支持PNG透明)</label>
                <input type="file" id="wmFile" accept="image/*">
                <div class="watermark-edit-container" id="wmEditContainer">
                    <canvas id="wmEditCanvas"></canvas>
                </div>
                <label>透明度 (<span id="opVal">${Math.round(puzzle.watermark.opacity*100)}</span>%)</label>
                <input type="range" id="wmOpacity" min="10" max="100" value="${puzzle.watermark.opacity*100}">
                <hr style="margin:16px 0;">
                <label>✨ 柔光强度 (<span id="slVal">${puzzle.softlight.intensity}</span>%)</label>
                <input type="range" id="slIntensity" min="0" max="100" value="${puzzle.softlight.intensity}">
                <div class="btn-row">
                    <button class="btn btn-primary" id="applyWm">应用</button>
                    <button class="btn" id="closeWm">取消</button>
                </div>
            </div>`;
        document.body.appendChild(modal);

        const canvas = modal.querySelector('#wmEditCanvas');
        const ctx = canvas.getContext('2d');
        const container = modal.querySelector('#wmEditContainer');
        const opSlider = modal.querySelector('#wmOpacity');
        const opVal = modal.querySelector('#opVal');
        const slSlider = modal.querySelector('#slIntensity');
        const slVal = modal.querySelector('#slVal');
        const fileInput = modal.querySelector('#wmFile');
        opSlider.addEventListener('input', ()=> opVal.textContent = opSlider.value);
        slSlider.addEventListener('input', ()=> slVal.textContent = slSlider.value);

        let wmImg = puzzle.watermark.img;
        let wmAnchorX = puzzle.watermark.anchorX;
        let wmAnchorY = puzzle.watermark.anchorY;
        let wmSize = puzzle.watermark.sizePercent;
        let wmOpacity = puzzle.watermark.opacity;

        function resizeCanvas() {
            const maxW = container.clientWidth;
            const scale = maxW / fmt.puzzleW;
            canvas.width = fmt.puzzleW; canvas.height = fmt.puzzleH;
            canvas.style.width = maxW + 'px';
            canvas.style.height = (fmt.puzzleH * scale) + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function drawPreview() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if (previewImg.complete) ctx.drawImage(previewImg, 0,0,canvas.width,canvas.height);
            if (wmImg) {
                ctx.save(); ctx.globalAlpha = wmOpacity;
                const wmW = wmImg.width * (wmSize/100);
                const wmH = wmImg.height * (wmSize/100);
                const x = canvas.width * wmAnchorX - wmW/2;
                const y = canvas.height * wmAnchorY - wmH/2;
                ctx.drawImage(wmImg, x, y, wmW, wmH);
                ctx.restore();
            }
        }
        previewImg.onload = drawPreview;
        drawPreview();

        let touches = {};
        let initialPinchDist = 0;
        let initialSize = wmSize;
        let initialAnchorX = wmAnchorX;
        let initialAnchorY = wmAnchorY;

        function getTouchPos(touch) {
            const rect = canvas.getBoundingClientRect();
            return { x: (touch.clientX - rect.left) / rect.width, y: (touch.clientY - rect.top) / rect.height };
        }

        function handleTouchStart(e) {
            e.preventDefault();
            if (!wmImg) return;
            const keys = Object.keys(touches);
            if (keys.length === 0) { initialAnchorX = wmAnchorX; initialAnchorY = wmAnchorY; }
            for (let touch of e.changedTouches) touches[touch.identifier] = touch;
            if (Object.keys(touches).length === 2) {
                const touchArr = Object.values(touches);
                const dx = touchArr[0].clientX - touchArr[1].clientX;
                const dy = touchArr[0].clientY - touchArr[1].clientY;
                initialPinchDist = Math.sqrt(dx*dx + dy*dy);
                initialSize = wmSize;
                initialAnchorX = wmAnchorX; initialAnchorY = wmAnchorY;
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (!wmImg) return;
            const touchArr = Object.values(touches);
            if (touchArr.length === 1) {
                const pos = getTouchPos(touchArr[0]);
                wmAnchorX = Math.min(1, Math.max(0, pos.x));
                wmAnchorY = Math.min(1, Math.max(0, pos.y));
            } else if (touchArr.length === 2) {
                const t1 = touchArr[0], t2 = touchArr[1];
                const dx = t1.clientX - t2.clientX;
                const dy = t1.clientY - t2.clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (initialPinchDist > 0) {
                    const scale = dist / initialPinchDist;
                    wmSize = Math.max(1, initialSize * scale);
                }
                const cx = (t1.clientX + t2.clientX) / 2;
                const cy = (t1.clientY + t2.clientY) / 2;
                const pos = getTouchPos({clientX: cx, clientY: cy});
                wmAnchorX = Math.min(1, Math.max(0, pos.x));
                wmAnchorY = Math.min(1, Math.max(0, pos.y));
            }
            drawPreview();
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            for (let touch of e.changedTouches) delete touches[touch.identifier];
            if (Object.keys(touches).length < 2) {
                initialPinchDist = 0; initialSize = wmSize;
                initialAnchorX = wmAnchorX; initialAnchorY = wmAnchorY;
            }
        }

        canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
        canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
        canvas.addEventListener('touchend', handleTouchEnd);
        canvas.addEventListener('touchcancel', handleTouchEnd);

        let isDragging = false;
        canvas.addEventListener('mousedown', e => { if (!wmImg) return; isDragging=true; initialAnchorX=wmAnchorX; initialAnchorY=wmAnchorY; });
        window.addEventListener('mousemove', e => { if (!isDragging || !wmImg) return; const pos = getTouchPos({clientX:e.clientX,clientY:e.clientY}); wmAnchorX=Math.min(1,Math.max(0,pos.x)); wmAnchorY=Math.min(1,Math.max(0,pos.y)); drawPreview(); });
        window.addEventListener('mouseup', ()=> { isDragging=false; });

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = e => { const img = new Image(); img.onload = () => { wmImg = img; drawPreview(); }; img.src = e.target.result; };
            reader.readAsDataURL(file);
        });

        modal.querySelector('#closeWm').addEventListener('click', ()=> modal.remove());
        modal.querySelector('#applyWm').addEventListener('click', ()=>{
            if (!wmImg) { showToast('请先上传水印图片'); return; }
            puzzle.watermark.img = wmImg;
            puzzle.watermark.anchorX = wmAnchorX; puzzle.watermark.anchorY = wmAnchorY;
            puzzle.watermark.sizePercent = wmSize;
            puzzle.watermark.opacity = parseInt(opSlider.value)/100;
            puzzle.watermark.enabled = true;
            puzzle.softlight.intensity = parseInt(slSlider.value);
            puzzle.softlight.enabled = puzzle.softlight.intensity > 0;
            modal.remove(); reapplyEffects(idx);
        });
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    }

    // ==================== 位置编辑 ====================
    function openEditor(puzzleIndex) {
        const puzzle = puzzleResults[puzzleIndex];
        const fmt = puzzle.format;
        const loadPromises = puzzle.imageSources.map(src => new Promise(resolve => {
            if (!src) return resolve(null);
            const img = new Image(); img.onload=()=>resolve(img); img.onerror=()=>resolve(null); img.src=src;
        }));
        loadingOverlay.style.display='flex'; loadingText.textContent='准备编辑...';
        Promise.all(loadPromises).then(images => {
            loadingOverlay.style.display='none';
            showEditModal(images, puzzle, fmt, puzzleIndex);
        }).catch(() => { loadingOverlay.style.display='none'; showToast('加载图片失败'); });
    }

    function showEditModal(images, puzzle, fmt, idx) {
        const old = document.querySelector('.edit-modal'); if (old) old.remove();
        const modal = document.createElement('div');
        modal.className = 'modal-overlay edit-modal';
        modal.innerHTML = `
            <div style="position:relative; background:#fff; border-radius:16px; padding:12px;">
                <canvas id="editCanvas" style="max-width:90vw; max-height:70vh;"></canvas>
                <div style="display:flex; gap:8px; margin-top:10px; justify-content:center;">
                    <button class="btn" id="resetPos">重置</button>
                    <button class="btn btn-primary" id="applyPos">✅ 确定</button>
                    <button class="btn" id="cancelEdit">取消</button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        const canvas = modal.querySelector('#editCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = fmt.puzzleW; canvas.height = fmt.puzzleH;
        const maxW = Math.min(window.innerWidth*0.9, 600);
        const scale = maxW / fmt.puzzleW;
        canvas.style.width = maxW + 'px';
        canvas.style.height = (fmt.puzzleH * scale) + 'px';

        const offsets = puzzle.offsets.map(o => ({x:o.x, y:o.y}));
        let dragging = -1, dragStart = {x:0,y:0}, dragOffsetStart = {x:0,y:0};

        function redraw() {
            ctx.clearRect(0,0,fmt.puzzleW,fmt.puzzleH);
            for (let i=0; i<offsets.length; i++) {
                const col = i % fmt.cols, row = Math.floor(i/fmt.cols);
                const posX = col*fmt.cellW, posY = row*fmt.cellH;
                const img = images[i], off = offsets[i];
                ctx.save(); ctx.beginPath(); ctx.rect(posX,posY,fmt.cellW,fmt.cellH); ctx.clip();
                if (img) {
                    const isOriginal = puzzle.format.ratio === 'original';
                    const s = isOriginal ? Math.min(fmt.cellW/img.width, fmt.cellH/img.height) : Math.max(fmt.cellW/img.width, fmt.cellH/img.height);
                    ctx.drawImage(img, posX+(fmt.cellW-img.width*s)/2+off.x, posY+(fmt.cellH-img.height*s)/2+off.y, img.width*s, img.height*s);
                }
                ctx.restore();
                ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=1; ctx.strokeRect(posX,posY,fmt.cellW,fmt.cellH);
            }
        }
        redraw();

        function getCellIdx(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const sx = fmt.puzzleW/rect.width, sy = fmt.puzzleH/rect.height;
            const x = (clientX-rect.left)*sx, y = (clientY-rect.top)*sy;
            const col = Math.floor(x/fmt.cellW), row = Math.floor(y/fmt.cellH);
            if (col>=0 && col<fmt.cols && row>=0 && row<fmt.rows) return row*fmt.cols+col;
            return -1;
        }
        function startDrag(e) { e.preventDefault(); const idx = getCellIdx(e.clientX, e.clientY); if (idx>=0 && images[idx]) { dragging=idx; dragStart={x:e.clientX,y:e.clientY}; dragOffsetStart={x:offsets[idx].x,y:offsets[idx].y}; } }
        function moveDrag(e) { if (dragging<0) return; e.preventDefault(); offsets[dragging].x = dragOffsetStart.x + (e.clientX - dragStart.x); offsets[dragging].y = dragOffsetStart.y + (e.clientY - dragStart.y); redraw(); }
        function endDrag() { dragging=-1; }

        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', e => { if (e.touches.length===1) startDrag({clientX:e.touches[0].clientX, clientY:e.touches[0].clientY, preventDefault:()=>{}}); }, {passive:false});
        window.addEventListener('touchmove', e => { if (dragging>=0) { e.preventDefault(); moveDrag({clientX:e.touches[0].clientX, clientY:e.touches[0].clientY, preventDefault:()=>{}}); } }, {passive:false});
        window.addEventListener('touchend', endDrag);

        modal.querySelector('#resetPos').addEventListener('click', ()=>{ offsets.forEach(o=>{o.x=0;o.y=0;}); redraw(); });
        modal.querySelector('#cancelEdit').addEventListener('click', ()=> modal.remove());
        modal.querySelector('#applyPos').addEventListener('click', ()=>{
            puzzle.offsets = offsets.map(o=>({x:o.x, y:o.y}));
            puzzle.rawDataURL = renderFinalPuzzle(images, offsets, fmt, fmt.grid, puzzle.numbering, puzzle.startNum, null, null, puzzle.format.ratio);
            puzzle.dataURL = renderFinalPuzzle(images, offsets, fmt, fmt.grid, puzzle.numbering, puzzle.startNum,
                puzzle.watermark.enabled ? puzzle.watermark : null,
                puzzle.softlight.enabled ? puzzle.softlight : null, puzzle.format.ratio);
            renderResults(); modal.remove(); showToast('位置已更新');
        });
        modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
    }

    // ==================== 下载与保存 ====================
    function downloadSingle(puzzle, idx) { const a=document.createElement('a'); a.href=puzzle.dataURL; a.download=`芝士大王拼图_${idx+1}.jpg`; a.click(); }
    function saveToAlbum(dataURL, idx) {
        if (/iPhone|iPad|iPod/.test(navigator.userAgent) && /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent)) {
            const div=document.createElement('div'); div.style='position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:600;display:flex;align-items:center;justify-content:center;';
            div.innerHTML=`<div style="background:#fff;border-radius:16px;padding:20px;text-align:center;max-width:300px;"><p style="font-weight:bold;">📱 保存到相册</p><p>请<b>长按</b>下方图片，选择「存储到“照片”」</p><img src="${dataURL}" style="width:100%;border-radius:8px;margin:8px 0;"><button class="btn btn-primary" id="closeSaveTip">知道了</button></div>`;
            document.body.appendChild(div); div.querySelector('#closeSaveTip').addEventListener('click', ()=>div.remove());
        } else { downloadSingle({dataURL}, idx); showToast('已下载，Android可到相册查看'); }
    }
    function openPreview(dataURL) {
        const div=document.createElement('div'); div.style='position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;display:flex;align-items:center;justify-content:center;';
        div.innerHTML=`<img src="${dataURL}" style="max-width:90vw;max-height:90vh;border-radius:8px;"><button style="position:absolute;top:20px;right:20px;background:#fff;border:none;width:30px;height:30px;border-radius:50%;">✕</button>`;
        div.querySelector('button').addEventListener('click', ()=>div.remove()); div.addEventListener('click', e=>{ if(e.target===div) div.remove(); });
        document.body.appendChild(div);
    }
    downloadZipBtn.addEventListener('click', async () => {
        if (!puzzleResults.length) return;
        downloadZipBtn.disabled=true;
        const zip = new JSZip();
        for (let i=0; i<puzzleResults.length; i++) {
            const blob = await (await fetch(puzzleResults[i].dataURL)).blob();
            zip.file(`芝士大王拼图_${i+1}.jpg`, blob);
        }
        const content = await zip.generateAsync({type:'blob'});
        const a=document.createElement('a'); a.href=URL.createObjectURL(content); a.download='芝士大王拼图合集.zip'; a.click();
        downloadZipBtn.disabled=false; showToast('ZIP 打包下载开始');
    });
})();
</script>
