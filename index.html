<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>芝士大王专用拼图</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --primary: #4A6CF7;
            --primary-light: #eef1fe;
            --danger: #ef4444;
            --success: #10b981;
            --text: #1e293b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px rgba(0,0,0,0.07);
            --radius: 12px;
            --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;user-select:none;background-image:radial-gradient(ellipse at 20% 20%, rgba(74,108,247,0.04) 0%, transparent 50%)}
        .app-header{background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100}
        .header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
        .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
        .logo span{background:var(--primary);color:#fff;width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center}
        .main-container{max-width:1200px;margin:0 auto;padding:20px 16px 60px}
        .card{background:#fff;border-radius:var(--radius);padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
        .upload-zone{border:2px dashed #cbd5e1;border-radius:12px;padding:30px;text-align:center;cursor:pointer;background:#fafbfc;margin-bottom:12px}
        .upload-zone.drag-over{border-color:var(--primary);background:#f5f6ff}
        .selector-group{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center}
        .selector-group .label{font-weight:600;font-size:14px;margin-right:4px}
        .btn-option{padding:6px 16px;border-radius:20px;border:2px solid var(--border);background:#fff;font-weight:600;cursor:pointer;font-size:13px;transition:0.2s}
        .btn-option.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
        .photos-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(70px,1fr));gap:8px;max-height:250px;overflow-y:auto;padding:4px}
        .photos-grid.sort-mode{max-height:none; grid-template-columns:repeat(auto-fill, minmax(100px,1fr)); gap:12px; padding:12px; background:#f8fafc; border-radius:12px;}
        .thumb-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:grab;border:2px solid transparent;transition:transform 0.15s;}
        .thumb-item img{width:100%;height:100%;object-fit:cover;pointer-events:none}
        .thumb-item .badge{position:absolute;top:2px;left:2px;background:rgba(0,0,0,0.6);color:#fff;width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center}
        .thumb-item .del-btn{position:absolute;top:2px;right:2px;background:rgba(239,68,68,0.9);color:#fff;border:none;width:18px;height:18px;border-radius:50%;font-size:12px;display:none;cursor:pointer;z-index:2}
        .thumb-item:hover .del-btn{display:flex;align-items:center;justify-content:center}
        .thumb-item.dragging{opacity:0.5; transform:scale(0.95); border-color:var(--primary);}
        .btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border-radius:20px;border:none;font-weight:600;font-size:13px;cursor:pointer;background:#fff;color:var(--text);transition:0.2s}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:disabled{opacity:0.5;pointer-events:none}
        .btn-danger{color:var(--danger);border:1.5px solid #fecaca}
        .btn-success{background:var(--success);color:#fff}
        .btn-warning{background:#f59e0b;color:#fff;}
        .results-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(220px,1fr));gap:16px}
        .result-card{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
        .result-card .card-header{padding:10px 14px;background:#fafbfc;font-weight:600;font-size:13px;display:flex;justify-content:space-between}
        .result-card img{width:100%;aspect-ratio:auto;max-height:300px;object-fit:contain;background:#f8fafc;cursor:pointer}
        .result-card .actions{padding:10px;display:flex;flex-wrap:wrap;gap:6px}
        .actions .btn{flex:1;justify-content:center;padding:6px 10px;font-size:12px}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;display:flex;align-items:center;justify-content:center}
        .modal-panel{background:#fff;border-radius:var(--radius);padding:24px;width:90%;max-width:360px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
        .modal-panel h3{margin-bottom:16px}
        .modal-panel .btn-row{display:flex; gap:8px; margin-top:16px;}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:600;animation:toastIn 0.3s}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
        #verticalColsGroup { margin-top: 4px; }
        #verticalCols { width: 70px; padding: 6px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; text-align: center; }
        .search-box { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .search-box input { width: 80px; padding: 8px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; text-align: center; }
        .color-picker-group { display: flex; align-items: center; gap: 6px; }
        .color-preset { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; transition: 0.2s; }
        .color-preset:hover { border-color: var(--primary); }
        .color-preset.active { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74,108,247,0.2); }
    </style>
</head>
<body>
<header class="app-header">
    <div class="header-inner">
        <div class="logo"><span>🧀</span> 芝士大王专用拼图</div>
        <div style="font-size:12px;color:#64748b;">标号颜色自选 · 查找原图 · 三种画质</div>
    </div>
</header>

<div class="main-container">
    <div class="card">
        <h3 style="margin-bottom:10px;">📤 上传照片 (不限量)</h3>
        <div class="upload-zone" id="uploadZone">
            <div style="font-size:32px;">🖼️</div>
            <div style="font-weight:600;">点击或拖拽照片到此处</div>
            <div style="font-size:13px;color:#94a3b8;">JPG/PNG/WebP · 不限数量</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple hidden>

        <div class="selector-group">
            <span class="label">📐 宫格：</span>
            <button class="btn-option active" data-grid="2x2">四宫格</button>
            <button class="btn-option" data-grid="3x3">九宫格</button>
            <button class="btn-option" data-grid="4x4">十六宫格</button>
            <button class="btn-option" data-grid="1x1">单张</button>
        </div>
        <div class="selector-group">
            <span class="label">📏 比例：</span>
            <button class="btn-option active" data-ratio="1:1">1:1</button>
            <button class="btn-option" data-ratio="3:4">3:4</button>
            <button class="btn-option" data-ratio="9:16">9:16</button>
            <button class="btn-option" data-ratio="original">原图</button>
            <button class="btn-option" data-ratio="vertical">竖版拼接</button>
        </div>
        <div class="selector-group" id="verticalColsGroup" style="display:none;">
            <span class="label">每行图片数：</span>
            <input type="number" id="verticalCols" value="3" min="1" max="20" step="1">
        </div>
        <div class="selector-group">
            <span class="label">🖼️ 画质：</span>
            <button class="btn-option active" data-quality="high">标准高清 (JPEG 90%)</button>
            <button class="btn-option" data-quality="compressed">压缩分享 (JPEG 80%)</button>
            <button class="btn-option" data-quality="lossless">超清原图 (PNG 无损)</button>
        </div>
        <div class="selector-group">
            <span class="label">🔢 标号：</span>
            <button class="btn-option active" data-numbering="true">开启</button>
            <button class="btn-option" data-numbering="false">关闭</button>
            <span style="margin-left:8px;">颜色：</span>
            <div class="color-picker-group" id="colorPickerGroup">
                <input type="color" id="numberColorPicker" value="#ffffff" style="width:30px; height:30px; border:none; border-radius:50%; padding:0; cursor:pointer;">
                <span class="color-preset active" data-color="#ffffff" style="background:#ffffff;"></span>
                <span class="color-preset" data-color="#ff6b6b" style="background:#ff6b6b;"></span>
                <span class="color-preset" data-color="#ffd93d" style="background:#ffd93d;"></span>
                <span class="color-preset" data-color="#6bcb77" style="background:#6bcb77;"></span>
                <span class="color-preset" data-color="#4d96ff" style="background:#4d96ff;"></span>
                <span class="color-preset" data-color="#000000" style="background:#000000;"></span>
            </div>
        </div>

        <div id="photosSection" style="display:none; margin-top:12px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span><strong id="photoCount">0</strong> 张</span>
                <div style="display:flex; gap:6px;">
                    <button class="btn btn-warning" id="sortModeBtn">🔄 调整顺序</button>
                    <button class="btn btn-danger" id="clearAllBtn">清空</button>
                    <button class="btn btn-primary" id="generateBtn">✨ 生成拼图</button>
                </div>
            </div>
            <div class="photos-grid" id="photosGrid"></div>
        </div>
    </div>

    <div id="resultsSection" style="display:none;">
        <div class="card">
            <div style="background:#f8fafc; padding:12px; border-radius:12px; margin-bottom:16px;" class="search-box">
                <span style="font-weight:600;">🔍 输入标号查找原图：</span>
                <input type="number" id="searchNum" min="1" placeholder="如 5">
                <button class="btn btn-primary" id="searchBtn">查找</button>
                <span id="searchResult" style="font-size:12px; color:#64748b; margin-left:8px;"></span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
                <h3>🎉 拼图结果</h3>
                <div style="display:flex; gap:6px;">
                    <button class="btn btn-success" id="saveAllBtn">📥 一键保存全部</button>
                    <button class="btn btn-primary" id="downloadZipBtn">📦 打包下载 ZIP</button>
                </div>
            </div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </div>
</div>

<div id="loadingOverlay" style="position:fixed; inset:0; background:rgba(255,255,255,0.8); backdrop-filter:blur(4px); z-index:400; display:none; align-items:center; justify-content:center; gap:12px;">
    <div style="width:40px; height:40px; border:4px solid #e2e8f0; border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite;"></div>
    <div id="loadingText">处理中...</div>
</div>

<script>
(function() {
    // DOM 元素
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const photosSection = document.getElementById('photosSection');
    const photosGrid = document.getElementById('photosGrid');
    const photoCountEl = document.getElementById('photoCount');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const generateBtn = document.getElementById('generateBtn');
    const resultsSection = document.getElementById('resultsSection');
    const resultsGrid = document.getElementById('resultsGrid');
    const downloadZipBtn = document.getElementById('downloadZipBtn');
    const saveAllBtn = document.getElementById('saveAllBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const verticalColsGroup = document.getElementById('verticalColsGroup');
    const verticalColsInput = document.getElementById('verticalCols');
    const sortModeBtn = document.getElementById('sortModeBtn');
    const searchNum = document.getElementById('searchNum');
    const searchBtn = document.getElementById('searchBtn');
    const searchResult = document.getElementById('searchResult');
    const numberColorPicker = document.getElementById('numberColorPicker');
    const colorPresets = document.querySelectorAll('.color-preset');

    // 状态变量
    let uploadedFiles = [];
    let objectURLs = [];
    let puzzleResults = [];
    let currentGrid = '2x2';
    let currentRatio = '1:1';
    let numberingEnabled = true;
    let numberColor = '#ffffff'; // 默认白色
    let currentQuality = 'high';
    let isSortMode = false;

    const GRID_CONFIG = {
        '2x2': { cols:2, rows:2 },
        '3x3': { cols:3, rows:3 },
        '4x4': { cols:4, rows:4 },
        '1x1': { cols:1, rows:1 }
    };

    function toggleVerticalCols() {
        verticalColsGroup.style.display = currentRatio === 'vertical' ? 'flex' : 'none';
    }

    function getFormat(ratio, grid, images) {
        const { cols, rows } = GRID_CONFIG[grid];
        if (ratio === 'original' && images && images.length) {
            const firstImg = images.find(img => img);
            if (firstImg) {
                const aspect = firstImg.width / firstImg.height;
                const CELL_BASE = 500;
                let cellW, cellH;
                if (aspect >= 1) { cellW = CELL_BASE; cellH = Math.round(CELL_BASE / aspect); }
                else { cellH = CELL_BASE; cellW = Math.round(CELL_BASE * aspect); }
                return { cellW, cellH, puzzleW: cellW * cols, puzzleH: cellH * rows, cols, rows };
            }
        }
        const BASE_CELL = 500;
        let cellW, cellH;
        if (ratio === '1:1') { cellW = BASE_CELL; cellH = BASE_CELL; }
        else if (ratio === '3:4') { cellW = BASE_CELL; cellH = Math.round(BASE_CELL * 4/3); }
        else if (ratio === '9:16') { cellW = BASE_CELL; cellH = Math.round(BASE_CELL * 16/9); }
        return { cellW: Math.round(cellW), cellH: Math.round(cellH), puzzleW: Math.round(cellW * cols), puzzleH: Math.round(cellH * rows), cols, rows };
    }

    function showToast(msg) {
        const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
        document.body.appendChild(t); setTimeout(()=>t.remove(), 2000);
    }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ==================== UI 绑定 ====================
    document.querySelectorAll('.btn-option[data-grid]').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.btn-option[data-grid]').forEach(x => x.classList.remove('active'));
            b.classList.add('active'); currentGrid = b.dataset.grid;
        });
    });
    document.querySelectorAll('.btn-option[data-ratio]').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.btn-option[data-ratio]').forEach(x => x.classList.remove('active'));
            b.classList.add('active'); currentRatio = b.dataset.ratio;
            toggleVerticalCols();
        });
    });
    document.querySelectorAll('.btn-option[data-numbering]').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.btn-option[data-numbering]').forEach(x => x.classList.remove('active'));
            b.classList.add('active'); numberingEnabled = b.dataset.numbering === 'true';
        });
    });
    document.querySelectorAll('.btn-option[data-quality]').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.btn-option[data-quality]').forEach(x => x.classList.remove('active'));
            b.classList.add('active'); currentQuality = b.dataset.quality;
        });
    });

    // 标号颜色选择器
    numberColorPicker.addEventListener('input', () => {
        numberColor = numberColorPicker.value;
        updateColorPresetActive();
    });
    colorPresets.forEach(preset => {
        preset.addEventListener('click', () => {
            const color = preset.dataset.color;
            numberColor = color;
            numberColorPicker.value = color;
            updateColorPresetActive();
        });
    });
    function updateColorPresetActive() {
        colorPresets.forEach(p => p.classList.remove('active'));
        const activePreset = document.querySelector(`.color-preset[data-color="${numberColor}"]`);
        if (activePreset) activePreset.classList.add('active');
    }

    // 排序模式
    sortModeBtn.addEventListener('click', () => {
        isSortMode = !isSortMode;
        if (isSortMode) {
            photosGrid.classList.add('sort-mode');
            sortModeBtn.textContent = '✅ 完成排序';
            sortModeBtn.classList.add('btn-primary');
            sortModeBtn.classList.remove('btn-warning');
            generateBtn.disabled = true;
            showToast('拖拽缩略图即可调整顺序，完成后点击“完成排序”');
        } else {
            photosGrid.classList.remove('sort-mode');
            sortModeBtn.textContent = '🔄 调整顺序';
            sortModeBtn.classList.remove('btn-primary');
            sortModeBtn.classList.add('btn-warning');
            generateBtn.disabled = uploadedFiles.length === 0;
        }
        renderPhotos();
    });

    // 查找原图
    searchBtn.addEventListener('click', () => {
        const num = parseInt(searchNum.value);
        if (isNaN(num) || num < 1) { searchResult.textContent = '请输入有效数字'; return; }
        if (num > uploadedFiles.length) { searchResult.textContent = `标号最大为 ${uploadedFiles.length}`; return; }
        const idx = num - 1;
        const originalUrl = objectURLs[idx];
        const fileName = uploadedFiles[idx].name || `原图_${num}`;
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-panel" style="text-align:center;">
                <h3>📷 原图 #${num}</h3>
                <img src="${originalUrl}" style="width:100%; border-radius:12px; margin-bottom:12px; max-height:60vh; object-fit:contain;">
                <div class="btn-row" style="flex-direction:column;">
                    <button class="btn btn-primary" id="downloadOriginal">💾 下载原图</button>
                    <button class="btn" id="closeOriginalModal">关闭</button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        modal.querySelector('#downloadOriginal').addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = originalUrl;
            a.download = fileName;
            a.click();
            showToast('原图下载开始');
        });
        modal.querySelector('#closeOriginalModal').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
        searchResult.textContent = `已找到标号 ${num}`;
    });

    // ==================== 上传逻辑 ====================
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
        if (e.target.files.length) addFiles(Array.from(e.target.files));
        fileInput.value = '';
    });
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
        e.preventDefault(); uploadZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) addFiles(Array.from(e.dataTransfer.files));
    });

    function addFiles(newFiles) {
        const images = newFiles.filter(f => f.type.startsWith('image/'));
        if (!images.length) { showToast('请选择图片文件'); return; }
        uploadedFiles.push(...images);
        images.forEach(f => objectURLs.push(URL.createObjectURL(f)));
        resetResults(); renderPhotos();
        photosSection.style.display = 'block';
    }

    function renderPhotos() {
        photosGrid.innerHTML = '';
        uploadedFiles.forEach((file, i) => {
            const item = document.createElement('div');
            item.className = 'thumb-item';
            item.draggable = true;
            item.dataset.index = i;
            item.innerHTML = `<img src="${objectURLs[i]}" draggable="false"><span class="badge">${i+1}</span>${!isSortMode ? '<button class="del-btn">×</button>' : ''}`;
            if (!isSortMode) {
                item.querySelector('.del-btn').addEventListener('click', e => { e.stopPropagation(); deletePhoto(i); });
            }
            item.addEventListener('dragstart', e => {
                if (!isSortMode) return;
                e.dataTransfer.setData('text/plain', i);
                item.classList.add('dragging');
            });
            item.addEventListener('dragend', () => item.classList.remove('dragging'));
            item.addEventListener('dragover', e => { if (isSortMode) e.preventDefault(); });
            item.addEventListener('drop', e => {
                e.preventDefault();
                if (!isSortMode) return;
                const from = parseInt(e.dataTransfer.getData('text/plain'));
                if (from !== i && !isNaN(from)) swapPhotos(from, i);
            });
            if (!isSortMode) {
                item.addEventListener('click', e => {
                    if (e.target.classList.contains('del-btn')) return;
                    const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
                    inp.onchange = () => { if (inp.files[0]) replacePhoto(i, inp.files[0]); };
                    inp.click();
                });
            }
            photosGrid.appendChild(item);
        });
        photoCountEl.textContent = uploadedFiles.length;
        generateBtn.disabled = uploadedFiles.length === 0 || isSortMode;
    }

    function deletePhoto(i) { URL.revokeObjectURL(objectURLs[i]); uploadedFiles.splice(i,1); objectURLs.splice(i,1); resetResults(); renderPhotos(); if (!uploadedFiles.length) photosSection.style.display='none'; }
    function replacePhoto(i, file) { if (!file.type.startsWith('image/')) return; URL.revokeObjectURL(objectURLs[i]); uploadedFiles[i]=file; objectURLs[i]=URL.createObjectURL(file); resetResults(); renderPhotos(); }
    function swapPhotos(a,b) { [uploadedFiles[a],uploadedFiles[b]]=[uploadedFiles[b],uploadedFiles[a]]; [objectURLs[a],objectURLs[b]]=[objectURLs[b],objectURLs[a]]; resetResults(); renderPhotos(); showToast('已交换位置'); }
    clearAllBtn.addEventListener('click', () => { objectURLs.forEach(u=>URL.revokeObjectURL(u)); uploadedFiles=[]; objectURLs=[]; resetResults(); renderPhotos(); photosSection.style.display='none'; });
    function resetResults() { puzzleResults=[]; resultsSection.style.display='none'; resultsGrid.innerHTML=''; }

    function loadImagesFromFiles(files) {
        return new Promise(resolve => {
            const imgs=[]; let loaded=0;
            if (!files.length) return resolve([]);
            files.forEach((file,i)=>{
                const reader=new FileReader();
                reader.onload=e=>{ const img=new Image(); img.onload=()=>{ imgs[i]=img; loaded++; check(); }; img.onerror=()=>{ imgs[i]=null; loaded++; check(); }; img.src=e.target.result; };
                reader.readAsDataURL(file);
            });
            function check(){ if(loaded===files.length) resolve(imgs.map((_,i)=>imgs[i])); }
        });
    }

    function exportCanvas(canvas, quality) {
        if (quality === 'lossless') return canvas.toDataURL('image/png');
        const q = quality === 'high' ? 0.9 : 0.8;
        return canvas.toDataURL('image/jpeg', q);
    }
    function getFileExtension(quality) { return quality === 'lossless' ? 'png' : 'jpg'; }

    // 核心渲染（带标号颜色）
    function renderGridPuzzle(images, offsets, fmt, numbering, startNum, isOriginal, quality, numColor) {
        const canvas = document.createElement('canvas');
        canvas.width = fmt.puzzleW; canvas.height = fmt.puzzleH;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,fmt.puzzleW,fmt.puzzleH);
        const totalCells = fmt.cols * fmt.rows;
        for (let i=0; i<totalCells; i++) {
            const col = i % fmt.cols, row = Math.floor(i/fmt.cols);
            const posX = col * fmt.cellW, posY = row * fmt.cellH;
            const img = i < images.length ? images[i] : null;
            const off = offsets[i] || {x:0,y:0};
            ctx.save(); ctx.beginPath(); ctx.rect(posX,posY,fmt.cellW,fmt.cellH); ctx.clip();
            if (img && img.width && img.height) {
                const scale = isOriginal ? Math.min(fmt.cellW / img.width, fmt.cellH / img.height) : Math.max(fmt.cellW / img.width, fmt.cellH / img.height);
                const sw = img.width * scale, sh = img.height * scale;
                ctx.drawImage(img, posX+(fmt.cellW-sw)/2+off.x, posY+(fmt.cellH-sh)/2+off.y, sw, sh);
            } else {
                ctx.fillStyle='#f1f5f9'; ctx.fillRect(posX,posY,fmt.cellW,fmt.cellH);
                ctx.fillStyle='#94a3b8'; ctx.font='bold 20px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText('空', posX+fmt.cellW/2, posY+fmt.cellH/2);
            }
            if (numbering && startNum!==undefined) {
                const num = startNum + i;
                ctx.restore(); ctx.save();
                const numFontSize = Math.min(fmt.cellW, fmt.cellH) * 0.12;
                ctx.font = `bold ${numFontSize}px "Arial"`; ctx.textAlign='center'; ctx.textBaseline='bottom';
                // 使用自选颜色
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillText(num, posX+fmt.cellW/2+1, posY+fmt.cellH-10+1);
                ctx.fillStyle = numColor;
                ctx.fillText(num, posX+fmt.cellW/2, posY+fmt.cellH-10);
                ctx.restore(); ctx.save();
            }
            ctx.restore();
        }
        return exportCanvas(canvas, quality);
    }

    function renderVerticalPuzzle(images, cols, numbering, startNum, quality, numColor) {
        const CELL_WIDTH = 500;
        const rows = Math.ceil(images.length / cols);
        const rowHeights = [];
        for (let r = 0; r < rows; r++) {
            let maxH = 0;
            for (let c = 0; c < cols; c++) {
                const idx = r * cols + c;
                if (idx < images.length && images[idx]) {
                    const img = images[idx];
                    const scaledH = (CELL_WIDTH / img.width) * img.height;
                    if (scaledH > maxH) maxH = scaledH;
                }
            }
            rowHeights.push(Math.max(maxH, CELL_WIDTH * 0.5));
        }
        const totalHeight = rowHeights.reduce((s, h) => s + h, 0);
        const canvas = document.createElement('canvas');
        canvas.width = CELL_WIDTH * cols;
        canvas.height = Math.round(totalHeight);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        let yOffset = 0;
        for (let r = 0; r < rows; r++) {
            const rowH = rowHeights[r];
            for (let c = 0; c < cols; c++) {
                const idx = r * cols + c;
                if (idx >= images.length) continue;
                const img = images[idx];
                if (!img) continue;
                const scaledW = CELL_WIDTH;
                const scaledH = (CELL_WIDTH / img.width) * img.height;
                const x = c * CELL_WIDTH;
                const y = yOffset + (rowH - scaledH) / 2;
                ctx.drawImage(img, x, y, scaledW, scaledH);
                if (numbering && startNum !== undefined) {
                    const num = startNum + idx;
                    const fontSize = Math.min(CELL_WIDTH, scaledH) * 0.08;
                    ctx.save();
                    ctx.font = `bold ${fontSize}px "Arial"`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    const numX = x + scaledW / 2;
                    const numY = y + scaledH - 4;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillText(num, numX + 1, numY + 1);
                    ctx.fillStyle = numColor;
                    ctx.fillText(num, numX, numY);
                    ctx.restore();
                }
            }
            yOffset += rowH;
        }
        return exportCanvas(canvas, quality);
    }

    generateBtn.addEventListener('click', async () => {
        if (!uploadedFiles.length || isSortMode) return;
        loadingOverlay.style.display='flex'; loadingText.textContent='加载照片...'; generateBtn.disabled=true;
        const currentNumColor = numberColor; // 保存当前颜色
        try {
            const images = await loadImagesFromFiles(uploadedFiles);
            loadingText.textContent='生成中...';
            puzzleResults = [];
            if (currentRatio === 'vertical') {
                const cols = parseInt(verticalColsInput.value) || 3;
                if (cols < 1) { showToast('每行至少1张'); return; }
                const startNum = numberingEnabled ? 1 : undefined;
                const dataURL = renderVerticalPuzzle(images, cols, numberingEnabled, startNum, currentQuality, currentNumColor);
                puzzleResults.push({
                    dataURL,
                    offsets: [],
                    imageSources: images.map(img => img ? img.src : null),
                    format: { grid: 'vertical', ratio: 'vertical', cols },
                    numbering: numberingEnabled,
                    startNum: startNum
                });
            } else {
                const grid = currentGrid;
                const fmt = getFormat(currentRatio, grid, images);
                const groupSize = GRID_CONFIG[grid].cols * GRID_CONFIG[grid].rows;
                const groupCount = Math.ceil(images.length / groupSize);
                let globalNum = 1;
                for (let g=0; g<groupCount; g++) {
                    const group = images.slice(g*groupSize, g*groupSize+groupSize);
                    const sources = group.map(img=>img?img.src:null);
                    const offsets = Array(groupSize).fill(null).map(()=>({x:0,y:0}));
                    const startNum = numberingEnabled ? globalNum : undefined;
                    const isOriginal = currentRatio === 'original';
                    const dataURL = renderGridPuzzle(group, offsets, fmt, numberingEnabled, startNum, isOriginal, currentQuality, currentNumColor);
                    puzzleResults.push({
                        dataURL, offsets, imageSources: sources,
                        format: {...fmt, grid, ratio: currentRatio},
                        numbering: numberingEnabled, startNum: startNum
                    });
                    globalNum += group.length;
                    await sleep(10);
                }
            }
            renderResults();
            resultsSection.style.display='block';
            resultsSection.scrollIntoView({ behavior:'smooth' });
        } catch(err) { console.error(err); showToast('生成失败'); }
        finally { loadingOverlay.style.display='none'; generateBtn.disabled=false; }
    });

    function renderResults() {
        resultsGrid.innerHTML='';
        puzzleResults.forEach((puzzle, idx) => {
            const card = document.createElement('div');
            card.className='result-card';
            const photoCount = puzzle.imageSources ? puzzle.imageSources.filter(Boolean).length : (puzzle.offsets ? puzzle.offsets.length : 0);
            card.innerHTML=`
                <div class="card-header"><span>拼图 #${idx+1}</span><span>${photoCount} 张</span></div>
                <img src="${puzzle.dataURL}" alt="拼图${idx+1}">
                <div class="actions">
                    ${puzzle.format.grid !== 'vertical' ? '<button class="btn edit-pos">🖐️ 位置</button>' : ''}
                    <button class="btn download-btn">💾 下载</button>
                    <button class="btn save-btn">📱 保存</button>
                </div>`;
            if (puzzle.format.grid !== 'vertical') {
                card.querySelector('.edit-pos').addEventListener('click', ()=>openEditor(idx));
            }
            card.querySelector('.download-btn').addEventListener('click', ()=>downloadSingle(puzzle, idx));
            card.querySelector('.save-btn').addEventListener('click', ()=>saveWithOptions(puzzle, idx));
            card.querySelector('img').addEventListener('click', ()=>openPreview(puzzle.dataURL));
            resultsGrid.appendChild(card);
        });
    }

    // 下载和保存（保留原有）
    function downloadSingle(puzzle, idx) {
        const a = document.createElement('a');
        a.href = puzzle.dataURL;
        a.download = `芝士大王拼图_${idx+1}.${getFileExtension(currentQuality)}`;
        a.click();
    }

    function saveWithOptions(puzzle, idx) {
        const dataURL = puzzle.dataURL;
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-panel" style="text-align:center;">
                <div style="font-size:40px;">💾</div>
                <h3>保存图片</h3>
                <p style="margin:8px 0;">请选择保存方式：</p>
                <div class="btn-row" style="flex-direction:column;">
                    <button class="btn btn-primary" id="directDownload">⬇️ 直接下载</button>
                    <button class="btn btn-outline" id="longPressSave">📱 长按保存到相册</button>
                </div>
            </div>`;
        document.body.appendChild(modal);

        modal.querySelector('#directDownload').addEventListener('click', () => {
            modal.remove();
            downloadSingle(puzzle, idx);
        });

        modal.querySelector('#longPressSave').addEventListener('click', () => {
            modal.remove();
            const guideModal = document.createElement('div');
            guideModal.className = 'modal-overlay';
            guideModal.innerHTML = `
                <div class="modal-panel" style="text-align:center;">
                    <div style="font-size:40px;">📱</div>
                    <h3>长按保存到相册</h3>
                    <p style="margin:12px 0;">请<b>长按</b>下方图片，然后选择<br><b>「存储到“照片”」</b></p>
                    <img src="${dataURL}" style="width:100%; border-radius:12px; margin-bottom:12px;">
                    <button class="btn btn-primary" id="closeGuide">知道了</button>
                </div>`;
            document.body.appendChild(guideModal);
            guideModal.querySelector('#closeGuide').addEventListener('click', ()=> guideModal.remove());
            guideModal.addEventListener('click', e => { if (e.target === guideModal) guideModal.remove(); });
        });

        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    }

    // 位置编辑（保留）
    function openEditor(puzzleIndex) { /* ...原有实现... */ }
    function showEditModal(images, puzzle, fmt, idx) { /* ...原有实现... */ }

    function openPreview(dataURL) {
        const div=document.createElement('div'); div.style='position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;display:flex;align-items:center;justify-content:center;';
        div.innerHTML=`<img src="${dataURL}" style="max-width:90vw;max-height:90vh;border-radius:8px;"><button style="position:absolute;top:20px;right:20px;background:#fff;border:none;width:30px;height:30px;border-radius:50%;">✕</button>`;
        div.querySelector('button').addEventListener('click', ()=>div.remove()); div.addEventListener('click', e=>{ if(e.target===div) div.remove(); });
        document.body.appendChild(div);
    }

    async function downloadAllAsZip() {
        if (!puzzleResults.length) return;
        downloadZipBtn.disabled = true;
        saveAllBtn.disabled = true;
        const zip = new JSZip();
        for (let i=0; i<puzzleResults.length; i++) {
            const blob = await (await fetch(puzzleResults[i].dataURL)).blob();
            zip.file(`芝士大王拼图_${i+1}.${getFileExtension(currentQuality)}`, blob);
        }
        const content = await zip.generateAsync({type:'blob'});
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = '芝士大王拼图合集.zip';
        a.click();
        setTimeout(()=>URL.revokeObjectURL(url), 100);
        downloadZipBtn.disabled = false;
        saveAllBtn.disabled = false;
        showToast('ZIP 下载开始');
    }

    saveAllBtn.addEventListener('click', downloadAllAsZip);
    downloadZipBtn.addEventListener('click', downloadAllAsZip);
})();
</script>
